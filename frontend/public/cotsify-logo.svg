<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00aaff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0033cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#33ccff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0055ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer C arc -->
  <path d="M 155 40 A 65 65 0 1 0 155 160" stroke="url(#cGrad)" stroke-width="14" stroke-linecap="round" fill="none" filter="url(#glow)"/>

  <!-- T letter inside -->
  <rect x="82" y="62" width="36" height="10" rx="3" fill="url(#blueGrad)"/>
  <rect x="96" y="72" width="10" height="42" rx="3" fill="url(#blueGrad)"/>

  <!-- Circuit dots on C -->
  <circle cx="62" cy="118" r="4" fill="#33ccff" filter="url(#glow)"/>
  <circle cx="62" cy="100" r="3" fill="#0088ff"/>
  <line x1="62" y1="100" x2="62" y2="118" stroke="#33ccff" stroke-width="1.5"/>
  <line x1="62" y1="100" x2="75" y2="100" stroke="#33ccff" stroke-width="1.5"/>
  <circle cx="75" cy="100" r="2.5" fill="#33ccff"/>

  <!-- Pixel dots top-right -->
  <rect x="148" y="38" width="7" height="7" rx="1.5" fill="#33ccff" opacity="0.9"/>
  <rect x="158" y="30" width="7" height="7" rx="1.5" fill="#0088ff" opacity="0.8"/>
  <rect x="158" y="42" width="5" height="5" rx="1" fill="#33ccff" opacity="0.6"/>
  <rect x="166" y="24" width="5" height="5" rx="1" fill="#0055ff" opacity="0.7"/>
  <rect x="166" y="36" width="4" height="4" rx="1" fill="#33ccff" opacity="0.5"/>
  <rect x="148" y="48" width="5" height="5" rx="1" fill="#0088ff" opacity="0.5"/>
</svg>
