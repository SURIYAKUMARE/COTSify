<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#1a2332"/>
  <rect x="15" y="25" width="170" height="150" rx="6" fill="#1a3a5c" stroke="#dc2626" stroke-width="2"/>
  <rect x="25" y="35" width="150" height="130" rx="4" fill="#0f2744"/>
  <!-- GPIO header -->
  <rect x="25" y="38" width="80" height="12" rx="2" fill="#111" stroke="#333" stroke-width="1"/>
  <line x1="30" y1="38" x2="30" y2="50" stroke="#888" stroke-width="1.5"/>
  <line x1="37" y1="38" x2="37" y2="50" stroke="#888" stroke-width="1.5"/>
  <line x1="44" y1="38" x2="44" y2="50" stroke="#888" stroke-width="1.5"/>
  <line x1="51" y1="38" x2="51" y2="50" stroke="#888" stroke-width="1.5"/>
  <line x1="58" y1="38" x2="58" y2="50" stroke="#888" stroke-width="1.5"/>
  <line x1="65" y1="38" x2="65" y2="50" stroke="#888" stroke-width="1.5"/>
  <line x1="72" y1="38" x2="72" y2="50" stroke="#888" stroke-width="1.5"/>
  <line x1="79" y1="38" x2="79" y2="50" stroke="#888" stroke-width="1.5"/>
  <line x1="86" y1="38" x2="86" y2="50" stroke="#888" stroke-width="1.5"/>
  <line x1="93" y1="38" x2="93" y2="50" stroke="#888" stroke-width="1.5"/>
  <!-- CPU -->
  <rect x="65" y="65" width="70" height="60" rx="4" fill="#222" stroke="#444" stroke-width="1.5"/>
  <text x="100" y="92" font-family="monospace" font-size="7" fill="#ef4444" text-anchor="middle">BCM2711</text>
  <text x="100" y="103" font-family="monospace" font-size="6" fill="#94a3b8" text-anchor="middle">Quad-core A72</text>
  <text x="100" y="113" font-family="monospace" font-size="6" fill="#94a3b8" text-anchor="middle">1.8GHz 4GB</text>
  <!-- USB ports -->
  <rect x="155" y="55" width="25" height="14" rx="2" fill="#333" stroke="#555" stroke-width="1"/>
  <rect x="155" y="73" width="25" height="14" rx="2" fill="#333" stroke="#555" stroke-width="1"/>
  <rect x="155" y="91" width="25" height="14" rx="2" fill="#1d4ed8" stroke="#3b82f6" stroke-width="1"/>
  <rect x="155" y="109" width="25" height="14" rx="2" fill="#1d4ed8" stroke="#3b82f6" stroke-width="1"/>
  <!-- Ethernet -->
  <rect x="155" y="130" width="25" height="18" rx="2" fill="#333" stroke="#555" stroke-width="1"/>
  <!-- USB-C power -->
  <rect x="25" y="155" width="20" height="10" rx="3" fill="#555" stroke="#777" stroke-width="1"/>
  <!-- HDMI -->
  <rect x="50" y="155" width="18" height="10" rx="2" fill="#111" stroke="#333" stroke-width="1"/>
  <rect x="72" y="155" width="18" height="10" rx="2" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="100" y="192" font-family="Arial,sans-serif" font-size="10" fill="#ef4444" text-anchor="middle" font-weight="bold">Raspberry Pi 4</text>
</svg>
