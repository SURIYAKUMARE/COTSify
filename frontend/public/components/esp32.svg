<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#1a2332"/>
  <!-- PCB -->
  <rect x="35" y="25" width="130" height="150" rx="4" fill="#1a3a5c" stroke="#2563eb" stroke-width="1.5"/>
  <!-- ESP32 module (silver) -->
  <rect x="50" y="45" width="100" height="70" rx="3" fill="#c0c0c0" stroke="#999" stroke-width="1"/>
  <rect x="55" y="50" width="90" height="60" rx="2" fill="#888"/>
  <!-- Chip on module -->
  <rect x="70" y="60" width="60" height="40" rx="2" fill="#222" stroke="#444" stroke-width="1"/>
  <text x="100" y="78" font-family="monospace" font-size="7" fill="#06b6d4" text-anchor="middle">ESP32</text>
  <text x="100" y="88" font-family="monospace" font-size="6" fill="#94a3b8" text-anchor="middle">WROOM-32</text>
  <!-- Antenna -->
  <rect x="130" y="47" width="18" height="4" rx="1" fill="#c0c0c0"/>
  <!-- Left pins -->
  <rect x="28" y="50" width="22" height="60" rx="2" fill="#111" stroke="#333" stroke-width="1"/>
  <line x1="28" y1="58" x2="50" y2="58" stroke="#888" stroke-width="1.5"/>
  <line x1="28" y1="66" x2="50" y2="66" stroke="#888" stroke-width="1.5"/>
  <line x1="28" y1="74" x2="50" y2="74" stroke="#888" stroke-width="1.5"/>
  <line x1="28" y1="82" x2="50" y2="82" stroke="#888" stroke-width="1.5"/>
  <line x1="28" y1="90" x2="50" y2="90" stroke="#888" stroke-width="1.5"/>
  <line x1="28" y1="98" x2="50" y2="98" stroke="#888" stroke-width="1.5"/>
  <!-- Right pins -->
  <rect x="150" y="50" width="22" height="60" rx="2" fill="#111" stroke="#333" stroke-width="1"/>
  <line x1="150" y1="58" x2="172" y2="58" stroke="#888" stroke-width="1.5"/>
  <line x1="150" y1="66" x2="172" y2="66" stroke="#888" stroke-width="1.5"/>
  <line x1="150" y1="74" x2="172" y2="74" stroke="#888" stroke-width="1.5"/>
  <line x1="150" y1="82" x2="172" y2="82" stroke="#888" stroke-width="1.5"/>
  <line x1="150" y1="90" x2="172" y2="90" stroke="#888" stroke-width="1.5"/>
  <line x1="150" y1="98" x2="172" y2="98" stroke="#888" stroke-width="1.5"/>
  <!-- USB -->
  <rect x="80" y="155" width="40" height="16" rx="3" fill="#555" stroke="#777" stroke-width="1"/>
  <rect x="85" y="158" width="30" height="10" rx="2" fill="#333"/>
  <!-- LED -->
  <circle cx="60" cy="140" r="4" fill="#3b82f6" opacity="0.9"/>
  <circle cx="60" cy="140" r="6" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
  <text x="100" y="190" font-family="Arial,sans-serif" font-size="11" fill="#3b82f6" text-anchor="middle" font-weight="bold">ESP32 DevKit V1</text>
</svg>
